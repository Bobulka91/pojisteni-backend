spring.application.name=pojisteni-beckend

# P?ipojení k MySQL databázi
spring.datasource.url=jdbc:mysql://localhost:3306/pojisteni?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate automaticky vytvo?í/aktualizuje tabulky podle entit
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CORS ? povolí React frontend (port 3000) volat backend (port 8080)
spring.web.cors.allowed-origins=http://localhost:3000